<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parag Milk - Demand</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --brown: #3D1F00;
    --orange: #C97A2A;
    --cream: #FFF8EE;
    --border: #E8D5B0;
    --green: #2A7A4A;
    --red: #C0392B;
    --muted: #8B6A4A;
    --font: 'Segoe UI', sans-serif;
  }
  body { background: var(--cream); font-family: var(--font); min-height: 100vh; }

  .header {
    background: linear-gradient(135deg, var(--brown), #6B3A10);
    color: white; padding: 14px 20px; text-align: center;
  }
  .header h1 { font-size: 1.2rem; font-weight: 800; }

  .main { max-width: 480px; margin: 0 auto; padding: 14px; }

  .card {
    background: white; border-radius: 14px;
    border: 1.5px solid var(--border); padding: 16px;
    margin-bottom: 14px; box-shadow: 0 2px 8px rgba(61,31,0,0.06);
  }

  label {
    font-size: 0.75rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    display: block; margin-bottom: 5px;
  }

  select, input[type="text"], input[type="date"], input[type="number"] {
    width: 100%; padding: 10px 13px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 0.9rem; background: var(--cream);
    color: var(--brown); font-family: var(--font); margin-bottom: 12px;
  }
  select:focus, input:focus { outline: none; border-color: var(--orange); }

  .btn {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    font-size: 0.95rem; font-weight: 800; cursor: pointer;
  }
  .btn-primary { background: linear-gradient(135deg, var(--brown), #6B3A10); color: white; }
  .btn-orange  { background: var(--orange); color: white; }
  .btn-blue    { background: #1A5FAB; color: white; }
  .btn:active  { opacity: 0.85; }
  .btn + .btn  { margin-top: 8px; }

  .prod-row {
    border: 1.5px solid var(--border); border-radius: 10px;
    padding: 10px; margin-bottom: 8px; background: var(--cream);
  }
  .qty-input {
    padding: 8px; text-align: center;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 0.9rem; margin-bottom: 0; background: white;
  }

  .info-bar {
    background: var(--brown); color: white; border-radius: 12px;
    padding: 11px 14px; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }

  .success-screen { display:none; text-align:center; padding:36px 20px; }
  .success-screen .emoji { font-size: 3.5rem; }
  .success-screen h2 { font-size: 1.3rem; font-weight: 800; color: var(--green); margin: 10px 0 6px; }
  .success-screen p { color: var(--muted); font-size: 0.88rem; }

  #loading { text-align: center; padding: 30px; color: var(--muted); }
</style>
</head>
<body>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<div class="header">
  <h1>🥛 Parag Milk</h1>
</div>

<div class="main">

  <div id="loading" style="text-align:center;padding:50px 20px;display:none;">
    <div style="font-size:2rem;margin-bottom:10px;">🥛</div>
    <div style="color:var(--muted);font-size:0.9rem;">Loading...</div>
  </div>

  <!-- Login -->
  <div id="login-step" class="card" style="display:none;">
    <label>Distributor Code</label>
    <input type="text" id="login-code" placeholder="e.g. 0177" style="text-transform:uppercase;">
    <label>Vehicle Number</label>
    <input type="text" id="login-vehicle" placeholder="e.g. UP32 AB 1234" style="text-transform:uppercase;">
    <button class="btn btn-primary" onclick="verifyCode()">🔓 Login</button>
    <p id="login-error" style="color:var(--red);font-size:0.82rem;text-align:center;margin-top:8px;display:none;"></p>
  </div>

  <!-- Demand Form -->
  <div id="demand-form" style="display:none;">

    <div class="info-bar">
      <div>
        <div style="font-weight:800;font-size:0.92rem;" id="logged-dist-name"></div>
        <div style="font-size:0.72rem;opacity:0.7;" id="logged-dist-info"></div>
      </div>
      <button onclick="logoutDist()" style="background:rgba(255,255,255,0.18);color:white;border:none;border-radius:8px;padding:5px 11px;font-size:0.78rem;cursor:pointer;">🚪 Logout</button>
    </div>

    <div class="card">
      <label>Taareekh</label>
      <input type="date" id="d-date">
      <label>Vehicle Number</label>
      <input type="text" id="d-vehicle" placeholder="Vehicle Number" style="text-transform:uppercase;">
      <button class="btn btn-orange" onclick="addDemandRow()">➕ Add Demand</button>
    </div>

    <div class="card" id="products-card">
      <div id="extra-rows"></div>

      <label style="margin-top:4px;">💰 Deposit Amount (₹)</label>
      <input type="number" id="d-deposit" placeholder="0.00" min="0" step="0.01" oninput="calcBalance()">

      <!-- Balance (auto shows) -->
      <div id="balance-bar" style="display:none;background:#F0F4FF;border:1.5px solid #C0D0F0;border-radius:10px;padding:10px 13px;margin-bottom:12px;font-size:0.82rem;">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
          <span style="color:var(--muted);">🧾 Total</span>
          <strong id="bal-total" style="color:var(--brown);"></strong>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <span style="color:var(--muted);">💰 Deposit</span>
          <strong id="bal-deposit" style="color:#1A5FAB;"></strong>
        </div>
        <div style="border-top:1px solid #C0D0F0;padding-top:6px;display:flex;justify-content:space-between;">
          <span id="bal-label" style="font-weight:700;font-size:0.85rem;"></span>
          <strong id="bal-balance" style="font-size:0.95rem;"></strong>
        </div>
      </div>

      <button class="btn btn-primary" onclick="submitDemand()">✅ Submit Demand</button>
      <button class="btn btn-blue" onclick="viewMyDemand()">👁️ Purani Demand Dekho</button>
    </div>

    <!-- Monthly Excel Report -->
    <div class="card">
      <label>📊 Monthly Excel Report</label>
      <input type="month" id="report-month" style="margin-bottom:10px;">
      <button class="btn btn-blue" onclick="downloadMonthlyReport()">📥 Download 1–31 Excel</button>
    </div>
  </div>

  <!-- View Demand -->
  <div id="view-demand-screen" style="display:none;">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <strong style="color:var(--brown);font-size:0.95rem;">👁️ Meri Demand</strong>
        <button onclick="closeViewDemand()" style="background:var(--red);color:white;border:none;border-radius:8px;padding:5px 11px;font-size:0.8rem;cursor:pointer;">✕ Band Karo</button>
      </div>
      <div id="view-demand-content"></div>
    </div>
  </div>

  <!-- Success -->
  <div class="success-screen" id="success-screen">
    <div class="emoji">🎉</div>
    <h2>Demand Submit Ho Gayi!</h2>
    <p id="success-msg"></p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;">
      <button class="btn btn-blue" onclick="viewMyDemandFromSuccess()">👁️ Demand Dekho</button>
      <button class="btn btn-primary" onclick="resetForm()">+ Nayi Demand</button>
    </div>
  </div>

</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC6I01bVVQvR0ChtcvWoH6unciAR9cbGtY",
    authDomain: "parag-milk-af613.firebaseapp.com",
    databaseURL: "https://parag-milk-af613-default-rtdb.firebaseio.com",
    projectId: "parag-milk-af613",
    storageBucket: "parag-milk-af613.firebasestorage.app",
    messagingSenderId: "972291445809",
    appId: "1:972291445809:web:bec6ee42bd03f10dbf7110"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const dbRef = db.ref('sharedData');

  // Show loading immediately
  document.getElementById('loading').style.display = 'block';

  let extraRowCount = 0;
  let appData = {};
  let allProds = [];
  let currentDist = null;

  function today() { return new Date().toISOString().split('T')[0]; }

  dbRef.once('value').then(snap => {
    appData = snap.val() || {};
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
    const cutoffDate = cutoff.toISOString().split('T')[0];
    if (appData.demandEntries) {
      const before = appData.demandEntries.length;
      appData.demandEntries = appData.demandEntries.filter(e => e.date >= cutoffDate);
      if (appData.demandEntries.length < before) dbRef.set(appData);
    }
    allProds = (appData.products || []).filter(p => p.active !== false && p.rate > 0);
    showLogin();
  }).catch(() => showLogin());
  setTimeout(showLogin, 5000);

  function showLogin() {
    if (showLogin.done) return;
    showLogin.done = true;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('login-step').style.display = 'block';
  }

  function verifyCode() {
    const code = document.getElementById('login-code').value.trim().toUpperCase();
    const vehicle = document.getElementById('login-vehicle').value.trim().toUpperCase();
    const errEl = document.getElementById('login-error');
    if (!code) { errEl.textContent = 'Code daalo!'; errEl.style.display = 'block'; return; }
    const dist = (appData.customers || []).find(c => c.code && c.code.toString().toUpperCase() === code);
    if (!dist) { errEl.textContent = '❌ Code galat hai!'; errEl.style.display = 'block'; return; }
    currentDist = dist;
    errEl.style.display = 'none';
    document.getElementById('login-step').style.display = 'none';
    document.getElementById('demand-form').style.display = 'block';
    document.getElementById('logged-dist-name').textContent = '🏪 ' + dist.name;
    document.getElementById('logged-dist-info').textContent = 'Code: ' + dist.code + (vehicle ? ' | ' + vehicle : '');
    document.getElementById('d-date').value = today();
    if (vehicle) document.getElementById('d-vehicle').value = vehicle;
  }

  function logoutDist() {
    currentDist = null;
    ['demand-form','view-demand-screen','success-screen'].forEach(id =>
      document.getElementById(id).style.display = 'none');
    document.getElementById('login-step').style.display = 'block';
    document.getElementById('login-code').value = '';
    document.getElementById('login-vehicle').value = '';
  }

  function addDemandRow() {
    const date = document.getElementById('d-date').value || today();
    const distName = currentDist ? currentDist.name : '';
    const existing = (appData.demandEntries||[]).find(e => e.date === date && e.distName === distName);
    if (existing && document.getElementById('extra-rows').children.length === 0) {
      if (!confirm(`⚠️ ${distName} ki ${date} ki demand already hai!\nPhir bhi add karein?`)) return;
    }
    extraRowCount++;
    const rowId = 'extra-' + extraRowCount;
    const div = document.createElement('div');
    div.id = rowId;
    div.className = 'prod-row';
    div.innerHTML = `
      <div style="margin-bottom:6px;">
        <input type="text" id="${rowId}-search" placeholder="🔍 Search product..."
          oninput="filterProducts('${rowId}')"
          style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:0.83rem;background:white;color:var(--brown);margin-bottom:5px;">
        <select id="${rowId}-sel" onchange="updateRate('${rowId}')"
          style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:0.85rem;background:white;color:var(--brown);">
          <option value="">-- Product --</option>
          ${allProds.map(p=>`<option value="${p.id}" data-rate="${p.rate||0}">${p.name}${p.size?' '+p.size:''}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="number" id="${rowId}-qty" class="qty-input" placeholder="Qty" min="0"
          oninput="updateRate('${rowId}');calcBalance();"
          style="flex:1;width:auto;margin-bottom:0;">
        <div id="${rowId}-amount" style="flex:1;text-align:right;font-weight:800;color:var(--green);font-size:0.88rem;"></div>
        <button onclick="removeRow('${rowId}');calcBalance();"
          style="background:var(--red);color:white;border:none;border-radius:8px;padding:7px 11px;cursor:pointer;font-size:0.82rem;">✕</button>
      </div>
      <div id="${rowId}-rateinfo" style="font-size:0.75rem;color:var(--muted);margin-top:3px;"></div>
    `;
    document.getElementById('extra-rows').appendChild(div);
  }

  function filterProducts(rowId) {
    const q = document.getElementById(rowId+'-search').value.toLowerCase();
    const sel = document.getElementById(rowId+'-sel');
    Array.from(sel.options).forEach(o => {
      if (!o.value) return;
      o.style.display = o.text.toLowerCase().includes(q) ? '' : 'none';
    });
    const visible = Array.from(sel.options).filter(o => o.value && o.style.display !== 'none');
    if (visible.length === 1) { sel.value = visible[0].value; updateRate(rowId); }
  }

  function updateRate(rowId) {
    const sel = document.getElementById(rowId+'-sel');
    const opt = sel.options[sel.selectedIndex];
    if (!opt || !opt.value) return;
    let rate = parseFloat(opt.dataset.rate) || 0;
    if (currentDist?.productRates?.[opt.value]) rate = parseFloat(currentDist.productRates[opt.value]);
    const qty = parseFloat(document.getElementById(rowId+'-qty').value) || 0;
    const amt = rate * qty;
    document.getElementById(rowId+'-rateinfo').textContent = rate ? `Rate: ₹${rate}` : '';
    document.getElementById(rowId+'-amount').textContent = amt > 0 ? `= ₹${amt.toFixed(2)}` : '';
  }

  function removeRow(rowId) { document.getElementById(rowId)?.remove(); }

  function calcBalance() {
    let total = 0;
    for (let i = 1; i <= extraRowCount; i++) {
      const rowId = 'extra-'+i;
      const sel = document.getElementById(rowId+'-sel');
      const qty = parseFloat(document.getElementById(rowId+'-qty')?.value) || 0;
      if (!sel) continue;
      const opt = sel.options[sel.selectedIndex];
      if (!opt?.value) continue;
      let rate = parseFloat(opt.dataset.rate) || 0;
      if (currentDist?.productRates?.[opt.value]) rate = parseFloat(currentDist.productRates[opt.value]);
      total += rate * qty;
    }
    const deposit = parseFloat(document.getElementById('d-deposit').value) || 0;
    const bar = document.getElementById('balance-bar');
    if (total > 0) {
      bar.style.display = 'block';
      const bal = total - deposit;
      document.getElementById('bal-total').textContent = '₹'+total.toFixed(2);
      document.getElementById('bal-deposit').textContent = '₹'+deposit.toFixed(2);
      document.getElementById('bal-balance').textContent = '₹'+Math.abs(bal).toFixed(2);
      document.getElementById('bal-balance').style.color = bal <= 0 ? '#2A7A4A' : '#C0392B';
      document.getElementById('bal-label').textContent = bal <= 0 ? '✅ Advance' : '⚠️ Baaki';
    } else {
      bar.style.display = 'none';
    }
  }

  function submitDemand() {
    const date = document.getElementById('d-date').value;
    const vehicle = document.getElementById('d-vehicle').value.trim().toUpperCase();
    const deposit = parseFloat(document.getElementById('d-deposit').value) || 0;
    const distName = currentDist ? currentDist.name : '';
    if (!distName) { alert('Pehle login karo!'); return; }
    if (!date) { alert('Date select karo!'); return; }

    const items = {};
    for (let i = 1; i <= extraRowCount; i++) {
      const rowId = 'extra-'+i;
      const sel = document.getElementById(rowId+'-sel');
      const qty = parseFloat(document.getElementById(rowId+'-qty')?.value) || 0;
      if (sel?.value && qty > 0) items[sel.value] = (items[sel.value]||0) + qty;
    }
    if (!Object.keys(items).length) { alert('Kam se kam ek product ki quantity daalo!'); return; }

    const entry = { id: Date.now(), date, distName, vehicle: vehicle||'', deposit, items, submittedAt: new Date().toISOString(), source: 'distributor' };
    if (!appData.demandEntries) appData.demandEntries = [];
    const idx = appData.demandEntries.findIndex(e => e.date === date && e.distName === distName);
    if (idx >= 0) {
      if (!confirm(`${distName} ki demand already hai. Update karein?`)) return;
      appData.demandEntries[idx] = entry;
    } else {
      appData.demandEntries.push(entry);
    }

    dbRef.set(appData).then(() => {
      document.getElementById('demand-form').style.display = 'none';
      document.getElementById('success-msg').textContent = `${distName} ki ${Object.keys(items).length} product(s) ki demand save ho gayi!`;
      document.getElementById('success-screen').style.display = 'block';
    }).catch(() => alert('❌ Save nahi hua! Internet check karo.'));
  }

  function resetForm() {
    ['success-screen','view-demand-screen'].forEach(id => document.getElementById(id).style.display = 'none');
    document.getElementById('demand-form').style.display = 'block';
    document.getElementById('d-date').value = today();
    document.getElementById('d-vehicle').value = '';
    document.getElementById('d-deposit').value = '';
    document.getElementById('extra-rows').innerHTML = '';
    document.getElementById('balance-bar').style.display = 'none';
    extraRowCount = 0;
    dbRef.once('value').then(snap => {
      appData = snap.val() || {};
      allProds = (appData.products||[]).filter(p => p.active !== false && p.rate > 0);
    });
  }

  function viewMyDemandFromSuccess() {
    document.getElementById('success-screen').style.display = 'none';
    document.getElementById('demand-form').style.display = 'block';
    viewMyDemand();
  }

  function viewMyDemand() {
    if (!currentDist) { alert('Pehle login karo!'); return; }
    dbRef.once('value').then(snap => {
      appData = snap.val() || {};
      allProds = appData.products || [];
      const entries = (appData.demandEntries||[]).filter(e => e.distName === currentDist.name);
      const content = document.getElementById('view-demand-content');
      if (!entries.length) {
        content.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;">Koi demand nahi mili!</p>';
      } else {
        entries.sort((a,b) => b.date.localeCompare(a.date));
        content.innerHTML = entries.map(e => {
          let total = 0;
          const rows = Object.entries(e.items||{}).map(([pid,qty]) => {
            const prod = allProds.find(p => String(p.id)===String(pid));
            const name = prod ? `${prod.name}${prod.size?' '+prod.size:''}` : pid;
            const rate = prod ? (prod.rate||0) : 0;
            total += rate * qty;
            return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.84rem;">
              <span><strong>${name}</strong></span>
              <span style="color:var(--orange);">Qty: <strong>${qty}</strong> &nbsp;₹${rate*qty}</span>
            </div>`;
          }).join('');
          const isToday = e.date === today();
          return `<div style="border:1.5px solid var(--border);border-radius:12px;padding:13px;margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;">
              <strong style="color:var(--brown);">${e.date}${isToday?'<span style="background:#2A7A4A;color:white;font-size:0.68rem;padding:2px 7px;border-radius:8px;margin-left:5px;">Aaj</span>':''}</strong>
              ${isToday?`<button onclick="editDemand('${e.distName}','${e.date}')" style="background:var(--orange);color:white;border:none;border-radius:7px;padding:5px 11px;font-size:0.78rem;font-weight:700;cursor:pointer;">✏️ Edit</button>`:''}
            </div>
            ${rows}
            <div style="margin-top:8px;padding:7px 11px;background:#FFF3E0;border-radius:8px;display:flex;justify-content:space-between;">
              <span style="font-size:0.8rem;color:var(--brown);font-weight:700;">🧾 Total</span>
              <strong style="color:var(--orange);">₹${total.toFixed(2)}</strong>
            </div>
            ${e.deposit>0?`<div style="margin-top:5px;padding:7px 11px;background:#E8F5EE;border-radius:8px;display:flex;justify-content:space-between;">
              <span style="font-size:0.8rem;color:#2A7A4A;font-weight:700;">💰 Deposit</span>
              <strong style="color:#2A7A4A;">₹${e.deposit} &nbsp;|&nbsp; ${e.date}</strong>
            </div>`:''}
          </div>`;
        }).join('');
      }
      document.getElementById('view-demand-screen').style.display = 'block';
      document.getElementById('view-demand-screen').scrollIntoView({ behavior:'smooth' });
    });
  }

  function closeViewDemand() { document.getElementById('view-demand-screen').style.display = 'none'; }

  function downloadMonthlyReport() {
    if (!currentDist) { alert('Pehle login karo!'); return; }
    const monthVal = document.getElementById('report-month').value;
    if (!monthVal) { alert('Month select karo!'); return; }
    const [yr, mn] = monthVal.split('-');
    const lastDay = new Date(parseInt(yr), parseInt(mn), 0).getDate();
    const fromDate = `${yr}-${mn}-01`;
    const toDate = `${yr}-${mn}-${String(lastDay).padStart(2,'0')}`;
    const monthLabel = new Date(parseInt(yr), parseInt(mn)-1, 1)
      .toLocaleString('en-IN', { month:'long', year:'numeric' }).toUpperCase();

    dbRef.once('value').then(snap => {
      const fresh = snap.val() || {};
      const prods = (fresh.products||[]).filter(p => p.active !== false);
      const entries = (fresh.demandEntries||[]).filter(e =>
        e.distName === currentDist.name && e.date >= fromDate && e.date <= toDate);
      if (!entries.length) { alert(`${monthLabel} mein koi demand nahi mili!`); return; }

      const usedPids = new Set();
      entries.forEach(e => Object.keys(e.items||{}).forEach(pid => usedPids.add(pid)));
      const monthProds = [...usedPids].map(pid => prods.find(p => String(p.id)===String(pid))).filter(Boolean);

      const BOM = '\uFEFF';
      let csv = BOM;
      csv += `"PARAG MILK — MONTHLY DEMAND"\n`;
      csv += `"${currentDist.name} | ${monthLabel}"\n\n`;
      csv += `"Date"`;
      monthProds.forEach(p => { csv += `,"${p.name}${p.size?' '+p.size:''}"`.trim(); });
      csv += `,"Deposit","Total Value"\n`;

      let grandTotal = 0;
      const colTotals = {};
      monthProds.forEach(p => { colTotals[p.id] = 0; });

      for (let d = 1; d <= lastDay; d++) {
        const dateStr = `${yr}-${mn}-${String(d).padStart(2,'0')}`;
        const entry = entries.find(e => e.date === dateStr);
        let row = `"${d}-${mn}-${yr}"`;
        let dayTotal = 0;
        monthProds.forEach(p => {
          if (entry) {
            const itemData = (entry.items||{})[p.id];
            const qty = itemData ? (typeof itemData==='object' ? (itemData.qty||0) : Number(itemData)) : 0;
            const rate = (currentDist.productRates?.[p.id]) ? currentDist.productRates[p.id] : (p.rate||0);
            const val = qty * rate;
            dayTotal += val; grandTotal += val;
            colTotals[p.id] = (colTotals[p.id]||0) + qty;
            row += `,${qty > 0 ? qty : ''}`;
          } else { row += `,`; }
        });
        row += `,${entry?.deposit > 0 ? entry.deposit : ''}`;
        row += `,${dayTotal > 0 ? dayTotal.toFixed(2) : ''}`;
        csv += row + '\n';
      }

      let totalRow = '"TOTAL"';
      monthProds.forEach(p => { totalRow += `,${colTotals[p.id] > 0 ? colTotals[p.id] : ''}`; });
      totalRow += `,,"${grandTotal.toFixed(2)}"`;
      csv += totalRow + '\n';

      const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${currentDist.name}_${yr}_${mn}.csv`;
      a.click(); URL.revokeObjectURL(url);
    }).catch(() => alert('Data load nahi hua!'));
  }

  function editDemand(distName, date) {
    document.getElementById('view-demand-screen').style.display = 'none';
    document.getElementById('d-date').value = date;
    document.getElementById('extra-rows').innerHTML = '';
    extraRowCount = 0;
    const entry = (appData.demandEntries||[]).find(e => e.date===date && e.distName===distName);
    if (entry) {
      if (entry.deposit) document.getElementById('d-deposit').value = entry.deposit;
      Object.entries(entry.items||{}).forEach(([pid,qty]) => {
        addDemandRow();
        const rowId = 'extra-'+extraRowCount;
        setTimeout(() => {
          const sel = document.getElementById(rowId+'-sel');
          if (sel) { sel.value = pid; updateRate(rowId); }
          const qtyInp = document.getElementById(rowId+'-qty');
          if (qtyInp) { qtyInp.value = qty; calcBalance(); }
        }, 50);
      });
    }
    document.getElementById('demand-form').scrollIntoView({ behavior:'smooth' });
  }
</script>
